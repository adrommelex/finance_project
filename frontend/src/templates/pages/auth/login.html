<div class="form-signin w-100 flex-grow-1 d-flex align-items-center justify-content-center mx-auto">
  <form class="d-flex flex-column align-items-center w-100 py-4 px-3">
    <a class="pb-5" href="/">
      <img src="/images/logo_auth.png" alt="Логотип">
    </a>
    <h1 class="my-3 fw-medium fs-1">Вход</h1>

    <div class="input-group-custom mb-2">
      <div class="icon-box">
        <i class="bi bi-envelope"></i>
      </div>
      <input type="email" class="form-control shadow-none" placeholder="Электронная почта">
    </div>

    <div class="input-group-custom">
      <div class="icon-box">
        <i class="bi bi-lock"></i>
      </div>
      <input type="password" class="form-control shadow-none" placeholder="Пароль">
    </div>

    <div class="form-check align-self-start my-3">
      <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
      <label class="form-check-label" for="checkDefault">
        Запомнить меня
      </label>
    </div>
    <button class="btn btn-primary w-100" type="submit">Войти</button>
    <p class="mt-2 align-self-start text-body-secondary">Ещё нет аккаунта? <a href="/signup">Пройдите регистрацию</a></p>
  </form>
</div>
