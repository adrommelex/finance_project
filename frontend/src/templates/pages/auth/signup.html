<div class="form-signin w-100 flex-grow-1 d-flex align-items-center justify-content-center mx-auto">
  <form class="d-flex flex-column align-items-center w-100 py-4 px-3">
    <a class="pb-5" href="/">
      <img src="/images/logo_auth.png" alt="Логотип">
    </a>
    <h1 class="my-3 fw-medium fs-1">Создайте аккаунт</h1>

    <div class="input-group-custom mb-2">
      <div class="icon-box">
        <i class="bi bi-person"></i>
      </div>
      <input type="text" class="form-control shadow-none" placeholder="Имя">
    </div>

    <div class="input-group-custom mb-2">
      <div class="icon-box">
        <i class="bi bi-person"></i>
      </div>
      <input type="text" class="form-control shadow-none" placeholder="Фамилия">
    </div>

    <div class="input-group-custom mb-2">
      <div class="icon-box">
        <i class="bi bi-envelope"></i>
      </div>
      <input type="email" class="form-control shadow-none" placeholder="Электронная почта">
    </div>

    <div class="input-group-custom mb-2">
      <div class="icon-box">
        <i class="bi bi-lock"></i>
      </div>
      <input type="password" class="form-control shadow-none" placeholder="Пароль">
    </div>

    <div class="input-group-custom mb-3">
      <div class="icon-box">
        <i class="bi bi-lock"></i>
      </div>
      <input type="password" class="form-control shadow-none" placeholder="Подтверждение пароля">
    </div>

    <button class="btn btn-primary w-100" type="submit">Войти</button>
    <p class="mt-2 text-body-secondary">Уже есть аккаунт? <a href="/login">Войдите в систему</a></p>
  </form>
</div>
