<div class="container-fluid">
  <h1 class="page-header mb-5">Редактирование расхода</h1>

  <form class="create-category-form d-flex flex-column gap-2 col-lg-4">
    <div>
      <input type="text"
             class="form-control px-3 py-2"
             id="outcome-type"
             placeholder="Тип...">
    </div>
    <div>
      <input type="text"
             class="form-control px-3 py-2"
             id="outcome"
             placeholder="Категория...">
    </div>
    <div>
      <input type="text"
             class="form-control px-3 py-2"
             id="outcome-sum"
             placeholder="Сумма в $...">
    </div>
    <div>
      <input type="text"
             class="form-control px-3 py-2"
             id="outcome-date"
             placeholder="Дата...">
    </div>
    <div class="mb-3">
      <input type="text"
             class="form-control px-3 py-2"
             id="outcome-comment"
             placeholder="Комментарий...">
    </div>

    <div class="d-flex gap-2 my-4">
      <button type="submit" class="btn btn-success" id="save-outcome-button">Создать</button>
      <button type="button" class="btn btn-danger" id="dismiss-outcome-button">Отмена</button>
    </div>
  </form>
</div>
