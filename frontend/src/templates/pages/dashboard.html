<div class="container-fluid">
  <h1 class="page-header my-5 text-center text-md-start">Главная</h1>

  <div class="d-flex align-items-center justify-content-center justify-content-md-start flex-wrap gap-3">
    <button class="btn btn-secondary active">Сегодня</button>
    <button class="btn btn-outline-secondary">Неделя</button>
    <button class="btn btn-outline-secondary">Месяц</button>
    <button class="btn btn-outline-secondary">Год</button>
    <button class="btn btn-outline-secondary">Все</button>
    <button class="btn btn-outline-secondary">Интервал</button>

    <div class="d-flex align-items-center gap-2 ms-md-2 fs-6 fw-medium">
      <span>с</span>
      <a class="px-2 py-3 pointer-event text-secondary" id="date-from">Дата</a>
      <span>по</span>
      <a class="px-2 py-3 pointer-event text-secondary" id="date-to">Дата</a>
    </div>
  </div>

  <div class="charts-row row">
    <!-- Блок Доходы -->
    <div class="col-md-6 d-flex justify-content-center text-center border-end">
      <div class="chart d-flex flex-column align-items-center">
        <h3 class="mb-3">Доходы</h3>

        <div class="d-flex justify-content-between w-100 mb-5">
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #dc3545;"></span>
            <span class="mx-2 small">Red</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #fd7e14;"></span>
            <span class="mx-2 small">Orange</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #ffc107;"></span>
            <span class="mx-2 small">Yellow</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #20c997;"></span>
            <span class="mx-2 small">Green</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #0d6efd;"></span>
            <span class="mx-2 small">Blue</span>
          </div>
        </div>

        <div class="income-chart mb-5">
          <canvas id="incomeChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Блок Расходы -->
    <div class="col-md-6 d-flex justify-content-center text-center">
      <div class="chart d-flex flex-column align-items-center">
        <h3 class="mb-3">Расходы</h3>
        <div class="d-flex justify-content-between w-100 mb-5">
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #dc3545;"></span>
            <span class="mx-2 small">Red</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #fd7e14;"></span>
            <span class="mx-2 small">Orange</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #ffc107;"></span>
            <span class="mx-2 small">Yellow</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #20c997;"></span>
            <span class="mx-2 small">Green</span>
          </div>
          <div class="legend-item d-flex align-items-center">
            <span class="legend-color-box" style="background-color: #0d6efd;"></span>
            <span class="mx-2 small">Blue</span>
          </div>
        </div>

        <div class="expenses-chart mb-5">
          <canvas id="expensesChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
