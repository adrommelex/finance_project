<div class="container-fluid d-flex flex-column gap-5">
  <h1 class="page-header mb-0">Доходы и расходы</h1>

  <div>
    <button class="btn btn-success me-2" id="add-income">Создать доход</button>
    <button class="btn btn-danger" id="add-expense">Создать расход</button>
  </div>

  <div class="d-flex align-items-center justify-content-center justify-content-lg-start flex-wrap gap-3">
    <button class="btn period-btn btn-secondary active" data-period="today">Сегодня</button>
    <button class="btn period-btn btn-outline-secondary" data-period="week">Неделя</button>
    <button class="btn period-btn btn-outline-secondary" data-period="month">Месяц</button>
    <button class="btn period-btn btn-outline-secondary" data-period="year">Год</button>
    <button class="btn period-btn btn-outline-secondary" data-period="all">Все</button>
    <button class="btn period-btn btn-outline-secondary" data-period="interval">Интервал</button>

    <div class="d-flex align-items-center gap-2 ms-2 fs-6 fw-medium">
      <span>с</span>
      <a class="px-2 py-3 pointer-event text-secondary" id="date-from">Дата</a>
      <span>по</span>
      <a class="px-2 py-3 pointer-event text-secondary" id="date-to">Дата</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle" id="table">
      <thead class="border-bottom border-top">
      <tr>
        <th scope="col">№ операции</th>
        <th scope="col">Тип</th>
        <th scope="col">Категория</th>
        <th scope="col">Сумма</th>
        <th scope="col">Дата</th>
        <th scope="col">Комментарий</th>
        <th scope="col" class="text-end"></th>
      </tr>
      </thead>
      <tbody id="operations-table-body">

      </tbody>
    </table>
  </div>

</div>
